<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, maximum-scale=1">
<!-- Match Roam's PWA: standalone via WEB MANIFEST (keyboard OVERLAYS the content), NOT the legacy
     apple-mobile-web-app-capable meta (which makes iOS RESIZE the viewport / push content up). -->
<link rel="manifest" href="kbtest.webmanifest">
<meta name="theme-color" content="#000000">
<title>Notes</title>
<style>
  * { box-sizing: border-box; -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000; }
  body { font-family: -apple-system, system-ui, sans-serif; color: #fff; }

  /* the ONE scroll container (the note body) */
  #scrollwrap { height: 100vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: #000; }
  #note { max-width: 720px; margin: 0 auto; padding: 0 18px 40vh; }

  /* top nav (sticky, like Notes) */
  .nav { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between;
         padding: 8px 0 6px; background: #000; }
  .nav .right { display: flex; align-items: center; gap: 10px; }
  .navbtn { width: 38px; height: 38px; border-radius: 50%; background: #1c1c1e; color: #d7d7db; border: 0;
            font-size: 19px; display: flex; align-items: center; justify-content: center; }
  .navpill { display: flex; align-items: center; gap: 16px; background: #1c1c1e; border-radius: 19px; height: 38px; padding: 0 16px; color: #d7d7db; font-size: 17px; }
  .date { text-align: center; color: #8e8e93; font-size: 12px; margin: 2px 0 12px; }
  .title { font: 800 27px/1.15 -apple-system, system-ui; color: #fff; margin: 0 0 10px; outline: none; }

  /* checklist */
  .row { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; }
  .chk { width: 21px; height: 21px; border: 1.6px solid #5d5d61; border-radius: 50%; flex: 0 0 auto; margin-top: 3px; }
  .txt { flex: 1 1 auto; font: 17px/1.35 -apple-system, system-ui; color: #fff; outline: none; min-height: 23px; word-break: break-word; }

  /* code block as a note item (dark card, CM6 inside) */
  .coderow { flex: 1 1 auto; background: #1c1c1e; border-radius: 9px; padding: 8px 10px; overflow: hidden; }
  .coderow .cm-editor { background: transparent; }
  .coderow .cm-content { caret-color: #fff; color: #e6e6ea; font: 13.5px/1.55 ui-monospace, Menlo, monospace; }
  .coderow .cm-cursor, .coderow .cm-dropCursor { border-left-color: #fff; }
  .coderow .cm-gutters { display: none; }
  .coderow .cm-activeLine, .coderow .cm-line { background: transparent; }
  .coderow .cm-selectionBackground, .coderow .cm-content ::selection { background: #38383c !important; }
  .coderow.cmfail { font: 13.5px/1.55 ui-monospace, monospace; color: #e6e6ea; white-space: pre-wrap; outline: none; }

  /* the accessory bar (pinned above the keyboard via SB2 — the cmdbar stand-in) */
  #bar { position: fixed; left: 0; right: 0; bottom: 0; height: 48px; z-index: 50; will-change: transform;
         background: #1c1c1e; border-top: 0.5px solid #333; display: flex; align-items: center;
         padding: 0 16px max(0px, env(safe-area-inset-bottom)); gap: 22px; color: #d7d7db; font-size: 19px; }
  #bar .spacer { flex: 1 1 auto; }
  #bar .compose { color: #f5c518; font-size: 21px; }

  /* tiny debug panel (hidden; opened by the ⚙) — bar/viewport numbers only; the reveal is WebKit's, not tunable */
  #fxToggle { position: fixed; right: 10px; bottom: 56px; z-index: 70; width: 34px; height: 34px; border-radius: 50%;
              background: rgba(60,60,64,.85); color: #fff; border: 0; font-size: 16px; will-change: transform; }
  #fx { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60; background: rgba(0,0,0,.93); color: #9fe3a1;
        font: 11px/1.4 ui-monospace, monospace; padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        display: none; will-change: transform; max-height: 60vh; overflow: auto; }
  #fx[data-open="1"] { display: block; }
  #fx .one { color: #ffd166; white-space: pre-wrap; }
  #fx .btns { margin-top: 7px; }
  #fx button { font: 11px monospace; color: #000; background: #9fe3a1; border: 0; border-radius: 5px; padding: 6px 8px; margin: 3px 4px 0 0; }
  #fx pre { white-space: pre-wrap; margin: 7px 0 0; color: #9fe3a1; }
</style>
</head>
<body>
<div id="scrollwrap">
  <div id="note">
    <div class="nav">
      <button class="navbtn" type="button" aria-label="back">‹</button>
      <div class="right">
        <button class="navbtn" type="button" aria-label="undo">↶</button>
        <div class="navpill"><span>↑</span><span>⋯</span></div>
      </div>
    </div>
    <div class="date">June 17, 2026 at 17:41</div>
    <div class="title" contenteditable="true">test</div>
    <div id="checklist"></div>
  </div>
</div>

<!-- accessory bar pinned above the keyboard (SB2) -->
<div id="bar">
  <span>☑</span><span>Aa</span><span>📷</span><span>✎</span><span class="spacer"></span><span class="compose">✐</span>
</div>

<!-- tiny debug (hidden) -->
<button id="fxToggle" type="button">⚙</button>
<div id="fx" data-open="0">
  <div class="one" id="fxone">…</div>
  <div class="btns" id="fxbtns"></div>
  <pre id="fxdetail"></pre>
</div>

<script type="module">
  // ===================== Apple Notes clone — iOS keyboard sandbox =====================
  // FINDING (measured frame-by-frame, two independent methods, OCR of toggled settings): the content reveal
  // when you tap a line is WebKit's OWN native keyboard content-scroll (~250ms ease-in-out open / ~383ms close,
  // coupled to the keyboard) — IDENTICAL to Apple Notes, and NOT app-controllable. App-side delay/duration/
  // easing/freeze had ZERO measurable effect (matched reveals were pixel-identical regardless of the toggles),
  // so that machinery was REMOVED. The only app-controlled motion is pinning the bar (SB2). WebKit reveals free.
  const wrap = document.getElementById('scrollwrap');
  const checklist = document.getElementById('checklist');
  const bar = document.getElementById('bar');
  const fx = document.getElementById('fx'), fxone = document.getElementById('fxone'),
        fxbtns = document.getElementById('fxbtns'), fxdetail = document.getElementById('fxdetail'),
        fxToggle = document.getElementById('fxToggle');
  const vv = window.visualViewport;
  let SCREEN_H = window.innerHeight;
  let cm6ok = false, cm6err = '';

  // ---------- checklist: a..z with a few CM6 code blocks mixed in ----------
  const LETTERS = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const CODE_AT = {
    5: 'const x = 1;\nconst y = 2;\nreturn x + y;',
    12: 'function add(a, b) {\n  return a + b;\n}',
    19: 'for (let i = 0; i < 3; i++)\n  console.log(i);'
  };
  const codeMounts = [];
  function textRow(ch) {
    const row = document.createElement('div'); row.className = 'row';
    const chk = document.createElement('span'); chk.className = 'chk';
    const txt = document.createElement('div'); txt.className = 'txt'; txt.contentEditable = 'true'; txt.textContent = ch;
    row.appendChild(chk); row.appendChild(txt); checklist.appendChild(row);
  }
  function codeRow(code) {
    const row = document.createElement('div'); row.className = 'row';
    const chk = document.createElement('span'); chk.className = 'chk';
    const cr = document.createElement('div'); cr.className = 'coderow';
    row.appendChild(chk); row.appendChild(cr); checklist.appendChild(row);
    codeMounts.push({ el: cr, doc: code });
  }
  LETTERS.forEach((ch, i) => { textRow(ch); if (CODE_AT[i]) codeRow(CODE_AT[i]); });

  // ---------- CM6 for the code-block note items (graceful fallback to editable text) ----------
  (async function initCM6() {
    try {
      const [V, St, Cm, LJ] = await Promise.all([
        import('https://esm.sh/@codemirror/view@6'),
        import('https://esm.sh/@codemirror/state@6'),
        import('https://esm.sh/@codemirror/commands@6'),
        import('https://esm.sh/@codemirror/lang-javascript@6'),
      ]);
      const { EditorView, keymap } = V; const { EditorState } = St;
      const { defaultKeymap, history, historyKeymap } = Cm; const { javascript } = LJ;
      for (const m of codeMounts) {
        new EditorView({ state: EditorState.create({ doc: m.doc, extensions: [history(), keymap.of([...defaultKeymap, ...historyKeymap]), javascript(), EditorView.lineWrapping] }), parent: m.el });
      }
      cm6ok = true;
    } catch (e) {
      cm6err = String(e && e.message || e).slice(0, 80);
      for (const m of codeMounts) { m.el.classList.add('cmfail'); m.el.contentEditable = 'true'; m.el.textContent = m.doc; }
    }
  })();

  // ---------- the ONLY app-controlled motion: pin the bar to the keyboard top (SB2) ----------
  // SCREEN_H constant — window.innerHeight drifts with scroll on iOS, so capture the full height in a clean state.
  function refreshScreenH() {
    if (document.activeElement === document.body && window.scrollY === 0 && vv && Math.round(vv.offsetTop) === 0
        && Math.round(vv.height) >= window.innerHeight - 2) SCREEN_H = window.innerHeight;
  }
  function place() {
    refreshScreenH();
    let ty = vv ? Math.round(vv.height + vv.offsetTop - SCREEN_H) : 0;
    if (ty > -2) ty = 0;
    bar.style.transform = 'translateY(' + ty + 'px)';
  }

  // ---------- tiny ⚙ debug: bar/viewport numbers + copy. (No reveal knobs — the reveal is WebKit's.) ----------
  function paintFx() {
    const o = vv ? Math.round(vv.offsetTop) : 0;
    fxone.textContent = 'BAR(SB2)  vvh ' + (vv ? Math.round(vv.height) : '?') + '  vvtop ' + o + '  SH ' + SCREEN_H +
      '  bar.bottom ' + Math.round(bar.getBoundingClientRect().bottom) + '  scr ' + Math.round(wrap.scrollTop);
    if (fx.getAttribute('data-open') === '1') {
      fxdetail.textContent =
        'innerHeight ' + window.innerHeight + '  SCREEN_H ' + SCREEN_H + '\n' +
        'vv.height ' + (vv ? Math.round(vv.height) : 'n/a') + '  vv.offsetTop ' + o + '\n' +
        'window.scrollY ' + Math.round(window.scrollY) + '  wrap.scrollTop ' + Math.round(wrap.scrollTop) + '\n' +
        'bar.bottom ' + Math.round(bar.getBoundingClientRect().bottom) + '\n' +
        'CM6 ' + (cm6ok ? 'loaded' : (cm6err ? 'FAILED: ' + cm6err : 'loading…')) + '\n' +
        'reveal = WebKit native (~250ms ease-in-out, system-driven, not app-controlled)';
    }
    fx.style.transform = 'translateY(' + o + 'px)'; fxToggle.style.transform = 'translateY(' + o + 'px)';
  }
  (function buildFxBtns() {
    const b = document.createElement('button'); b.type = 'button'; b.textContent = 'copy';
    b.addEventListener('mousedown', e => e.preventDefault());
    b.addEventListener('click', e => { e.preventDefault(); if (navigator.clipboard) navigator.clipboard.writeText(fxdetail.textContent).catch(() => {}); });
    fxbtns.appendChild(b);
  })();
  fxToggle.addEventListener('mousedown', e => e.preventDefault());
  fxToggle.addEventListener('click', e => { e.preventDefault(); fx.setAttribute('data-open', fx.getAttribute('data-open') === '1' ? '0' : '1'); paintFx(); });

  // ---------- wiring ----------
  if (vv) { vv.addEventListener('resize', () => { place(); paintFx(); }); vv.addEventListener('scroll', () => { place(); paintFx(); }); }
  window.addEventListener('orientationchange', () => { place(); paintFx(); });
  (function loop() { place(); paintFx(); requestAnimationFrame(loop); })();

  window.__KB = { state: () => ({ SCREEN_H, vvh: vv ? Math.round(vv.height) : 0, vvtop: vv ? Math.round(vv.offsetTop) : 0, barBottom: Math.round(bar.getBoundingClientRect().bottom), cm6ok, cm6err, codeRows: codeMounts.length }) };
</script>
</body>
</html>
