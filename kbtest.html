<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- mirror Roam's viewport meta exactly so iOS behaves identically -->
<meta name="viewport" content="width=device-width, maximum-scale=1">
<title>iOS keyboard-bar diagnostic</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-text-size-adjust: 100%; }
  html, body { margin: 0; height: 100%; background: #0d0f12; color: #d6dde6;
    font: 13px/1.35 -apple-system, system-ui, sans-serif; overflow: hidden; }
  /* Roam-like inner scroll container (the real app scrolls THIS, not the document) */
  #scroller { position: absolute; inset: 0; overflow: auto; -webkit-overflow-scrolling: touch; padding: 8px 12px 60vh; }
  h1 { font-size: 15px; color: #8fd; margin: 6px 0 12px; }
  .note { color: #93a; color: #b9a3d6; margin: 4px 0 14px; }
  .blk { margin: 0 0 38vh; }
  textarea { width: 100%; height: 44px; resize: none; background: #1a1f26; color: #e8eef5;
    border: 1px solid #2c3540; border-radius: 8px; padding: 8px 10px; font: 14px/1.2 ui-monospace, monospace; }
  label { display: block; color: #7f8c99; margin: 0 0 4px; font-size: 12px; }

  /* HUD pinned to the visual-viewport top so we can always read it */
  #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 100; pointer-events: none;
    background: rgba(8,10,13,.92); border-bottom: 1px solid #2c3540; padding: 6px 8px;
    font: 11px/1.3 ui-monospace, monospace; white-space: pre-wrap; }

  /* candidate bars — each position:fixed, a different pin strategy, stacked & color-coded.
     Each shows its label + its own rect.bottom so a screenshot reveals which hugs the keyboard. */
  .bar { position: fixed; left: 0; right: 0; height: 26px; z-index: 90; pointer-events: none;
    display: flex; align-items: center; padding: 0 8px; font: 700 11px/1 ui-monospace, monospace;
    color: #000; will-change: transform; }
  #barRED    { bottom: 0; background: #ff5a5a; }   /* MDN/current: translateY(vvtop+vvh-ih)  (= -overlap WITH offsetTop) */
  #barGREEN  { bottom: 0; background: #56d364; }   /* scroll-invariant: translateY(-(ih-vvh))  (NO offsetTop) */
  #barBLUE   { bottom: 0; background: #6cb6ff; }   /* raw fixed bottom:0, NO transform (reveals iOS native anchor) */
  #barMAGENTA{ top: 0;   background: #e571e5; }    /* top:0 anchor: translateY(vvtop+vvh-barH)  (the cmdbar's current model) */
</style>
</head>
<body>
<div id="scroller">
  <h1>iOS keyboard-bar diagnostic</h1>
  <div class="note">Focus each box, then scroll up/down and rubber-band overscroll. Screen-record.<br>
    The bar that stays EXACTLY at the keyboard top in EVERY case wins. Read the HUD numbers.</div>
  <div class="blk"><label>TOP input — tap here first</label><textarea>top</textarea></div>
  <div class="blk"><label>UPPER-MIDDLE input</label><textarea>upper-mid</textarea></div>
  <div class="blk"><label>CENTER input — tap (caret already visible, may NOT auto-scroll)</label><textarea>center</textarea></div>
  <div class="blk"><label>LOWER input — tap (likely forces a reveal-scroll)</label><textarea>lower</textarea></div>
  <div class="blk"><label>BOTTOM input</label><textarea>bottom</textarea></div>
</div>

<div id="hud">starting…</div>
<div class="bar" id="barRED">RED fixed+offsetTop</div>
<div class="bar" id="barGREEN">GREEN fixed −(ih−vvh)</div>
<div class="bar" id="barBLUE">BLUE raw fixed bottom:0</div>
<div class="bar" id="barMAGENTA">MAGENTA top:0 +offsetTop</div>

<script>
  var R = document.getElementById('barRED'),
      G = document.getElementById('barGREEN'),
      B = document.getElementById('barBLUE'),
      M = document.getElementById('barMAGENTA'),
      H = document.getElementById('hud'),
      SC = document.getElementById('scroller');
  var BARH = 26, GAP = 8;
  var raf = 0;
  function n(x){ return Math.round(x); }
  function update() {
    raf = 0;
    var vv = window.visualViewport;
    var ih = window.innerHeight, iw = window.innerWidth;
    var vvh = vv ? vv.height : ih, vvtop = vv ? vv.offsetTop : 0,
        vvpt = vv && 'pageTop' in vv ? vv.pageTop : -1, vvs = vv ? vv.scale : 1;
    // stack the bars 26px apart so all four are visible at once
    // RED  (MDN): bottom:0 + translateY(vvtop+vvh-ih)  → bar bottom should land at visual-viewport bottom
    R.style.transform = 'translateY(' + n(vvtop + vvh - ih) + 'px)';
    // GREEN: bottom:0 + translateY(-(ih-vvh)) (NO offsetTop) — stack 26 above RED
    G.style.transform = 'translateY(' + n(-(ih - vvh) - 26) + 'px)';
    // BLUE: raw bottom:0, no transform, stacked 52 above
    B.style.transform = 'translateY(-52px)';
    // MAGENTA: top:0 + translateY(vvtop+vvh-BARH) stacked 26 below top-of-stack via -78
    M.style.transform = 'translateY(' + n(vvtop + vvh - BARH - 78) + 'px)';
    var rr = R.getBoundingClientRect(), gr = G.getBoundingClientRect(),
        br = B.getBoundingClientRect(), mr = M.getBoundingClientRect();
    var visBottom = vvtop + vvh;          // visual-viewport bottom in layout coords
    H.textContent =
      'ih=' + ih + ' iw=' + iw + '  vvh=' + n(vvh) + ' vvtop=' + n(vvtop) + ' pageTop=' + n(vvpt) + ' scale=' + vvs.toFixed(2) + '\n' +
      'scrollY=' + n(window.scrollY) + ' scroller.scrollTop=' + n(SC.scrollTop) + '\n' +
      'ih-vvh=' + n(ih - vvh) + '  ih-vvh-vvtop(overlap)=' + n(ih - vvh - vvtop) + '  visBottom=' + n(visBottom) + '\n' +
      'RED.bottom=' + n(rr.bottom) + ' GREEN.bottom=' + n(gr.bottom) + ' BLUE.bottom=' + n(br.bottom) + ' MAG.bottom=' + n(mr.bottom);
  }
  function sched(){ if (!raf) raf = requestAnimationFrame(update); }
  if (window.visualViewport) {
    visualViewport.addEventListener('resize', sched);
    visualViewport.addEventListener('scroll', sched);
  }
  window.addEventListener('scroll', sched, true);
  SC.addEventListener('scroll', sched);
  window.addEventListener('orientationchange', function(){ setTimeout(sched, 200); });
  setInterval(sched, 250);   // heartbeat so the HUD stays live even if an event is missed
  update();
</script>
</body>
</html>
