<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, maximum-scale=1">
<!-- Match Roam's PWA: standalone via WEB MANIFEST (keyboard OVERLAYS the content), NOT the legacy
     apple-mobile-web-app-capable meta (which makes iOS RESIZE the viewport / push content up). -->
<link rel="manifest" href="kbtest.webmanifest">
<meta name="theme-color" content="#000000">
<title>Notes</title>
<style>
  * { box-sizing: border-box; -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000; }
  body { font-family: -apple-system, system-ui, sans-serif; color: #fff; }

  /* the ONE scroll container (the note body) */
  #scrollwrap { height: 100vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: #000; }
  #note { max-width: 720px; margin: 0 auto; padding: 0 18px 40vh; }

  /* top nav (sticky, like Notes) */
  .nav { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between;
         padding: 8px 0 6px; background: #000; }
  .nav .right { display: flex; align-items: center; gap: 10px; }
  .navbtn { width: 38px; height: 38px; border-radius: 50%; background: #1c1c1e; color: #d7d7db; border: 0;
            font-size: 19px; display: flex; align-items: center; justify-content: center; }
  .navpill { display: flex; align-items: center; gap: 16px; background: #1c1c1e; border-radius: 19px; height: 38px; padding: 0 16px; color: #d7d7db; font-size: 17px; }
  .date { text-align: center; color: #8e8e93; font-size: 12px; margin: 2px 0 12px; }
  .title { font: 800 27px/1.15 -apple-system, system-ui; color: #fff; margin: 0 0 10px; outline: none; }

  /* checklist */
  .row { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; }
  .chk { width: 21px; height: 21px; border: 1.6px solid #5d5d61; border-radius: 50%; flex: 0 0 auto; margin-top: 3px; }
  .txt { flex: 1 1 auto; font: 17px/1.35 -apple-system, system-ui; color: #fff; outline: none; min-height: 23px; word-break: break-word; }

  /* code block as a note item (dark card, CM6 inside) */
  .coderow { flex: 1 1 auto; background: #1c1c1e; border-radius: 9px; padding: 8px 10px; overflow: hidden; }
  .coderow .cm-editor { background: transparent; }
  .coderow .cm-content { caret-color: #fff; color: #e6e6ea; font: 13.5px/1.55 ui-monospace, Menlo, monospace; }
  .coderow .cm-cursor, .coderow .cm-dropCursor { border-left-color: #fff; }
  .coderow .cm-gutters { display: none; }
  .coderow .cm-activeLine, .coderow .cm-line { background: transparent; }
  .coderow .cm-selectionBackground, .coderow .cm-content ::selection { background: #38383c !important; }
  .coderow.cmfail { font: 13.5px/1.55 ui-monospace, monospace; color: #e6e6ea; white-space: pre-wrap; outline: none; }

  /* the accessory bar (pinned above the keyboard via SB2 — the cmdbar stand-in) */
  #bar { position: fixed; left: 0; right: 0; bottom: 0; height: 48px; z-index: 50; will-change: transform;
         background: #1c1c1e; border-top: 0.5px solid #333; display: flex; align-items: center;
         padding: 0 16px max(0px, env(safe-area-inset-bottom)); gap: 22px; color: #d7d7db; font-size: 19px; }
  #bar .spacer { flex: 1 1 auto; }
  #bar .compose { color: #f5c518; font-size: 21px; }

  /* finetune panel (hidden; opened by the ⚙) so the clone stays clean */
  #fxToggle { position: fixed; right: 10px; bottom: 56px; z-index: 70; width: 34px; height: 34px; border-radius: 50%;
              background: rgba(60,60,64,.85); color: #fff; border: 0; font-size: 16px; will-change: transform; }
  #fx { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60; background: rgba(0,0,0,.93); color: #9fe3a1;
        font: 11px/1.4 ui-monospace, monospace; padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        display: none; will-change: transform; max-height: 60vh; overflow: auto; }
  #fx[data-open="1"] { display: block; }
  #fx .one { color: #ffd166; white-space: pre-wrap; }
  #fx .btns { margin-top: 7px; }
  #fx button { font: 11px monospace; color: #000; background: #9fe3a1; border: 0; border-radius: 5px; padding: 6px 8px; margin: 3px 4px 0 0; }
  #fx pre { white-space: pre-wrap; margin: 7px 0 0; color: #9fe3a1; }
</style>
</head>
<body>
<div id="scrollwrap">
  <div id="note">
    <div class="nav">
      <button class="navbtn" type="button" aria-label="back">‹</button>
      <div class="right">
        <button class="navbtn" type="button" aria-label="undo">↶</button>
        <div class="navpill"><span>↑</span><span>⋯</span></div>
      </div>
    </div>
    <div class="date">June 17, 2026 at 17:41</div>
    <div class="title" contenteditable="true">test</div>
    <div id="checklist"></div>
  </div>
</div>

<!-- accessory bar pinned above the keyboard (SB2) -->
<div id="bar">
  <span>☑</span><span>Aa</span><span>📷</span><span>✎</span><span class="spacer"></span><span class="compose">✐</span>
</div>

<!-- finetune (hidden) -->
<button id="fxToggle" type="button">⚙</button>
<div id="fx" data-open="0">
  <div class="one" id="fxone">…</div>
  <div class="btns" id="fxbtns"></div>
  <pre id="fxdetail"></pre>
</div>

<script type="module">
  // ===================== Apple Notes clone — keyboard reveal sandbox =====================
  // Bar pinning = SB2 (confirmed on device): translateY(vv.height + vv.offsetTop − SCREEN_H), SCREEN_H constant.
  // Reveal = measured from a real Notes clip (OpenCV, frame-by-frame): after the keyboard is up, scroll the
  // caret line to ~AN_GAP px above the keyboard top, over AN_DUR ms, ease-in-out. No scroll above-fold / on close.
  const wrap = document.getElementById('scrollwrap');
  const note = document.getElementById('note');
  const checklist = document.getElementById('checklist');
  const bar = document.getElementById('bar');
  const fx = document.getElementById('fx'), fxone = document.getElementById('fxone'),
        fxbtns = document.getElementById('fxbtns'), fxdetail = document.getElementById('fxdetail'),
        fxToggle = document.getElementById('fxToggle');
  const vv = window.visualViewport;

  // tunables (live-editable from the ⚙ panel)
  let AN = true, FREEZE = true, AN_DELAY = 230, AN_DUR = 283, AN_GAP = 14;
  let learnedKb = parseInt(localStorage.getItem('kbtest_kb') || '0', 10) || 0;
  let SCREEN_H = window.innerHeight;
  let anFocusEl = null, anArmed = false, anScheduled = false, anTween = 0;
  let frozen = false, frozenTop = 0, frozenOverflow = '';
  let cm6ok = false, cm6err = '';

  // ---------- build the checklist: letters a..z with a few CM6 code blocks mixed in ----------
  const LETTERS = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const CODE_AT = {
    5: 'const x = 1;\nconst y = 2;\nreturn x + y;',
    12: 'function add(a, b) {\n  return a + b;\n}',
    19: 'for (let i = 0; i < 3; i++)\n  console.log(i);'
  };
  const codeMounts = [];
  function textRow(ch) {
    const row = document.createElement('div'); row.className = 'row';
    const chk = document.createElement('span'); chk.className = 'chk';
    const txt = document.createElement('div'); txt.className = 'txt'; txt.contentEditable = 'true'; txt.textContent = ch;
    row.appendChild(chk); row.appendChild(txt); checklist.appendChild(row);
  }
  function codeRow(code) {
    const row = document.createElement('div'); row.className = 'row';
    const chk = document.createElement('span'); chk.className = 'chk';
    const cr = document.createElement('div'); cr.className = 'coderow';
    row.appendChild(chk); row.appendChild(cr); checklist.appendChild(row);
    codeMounts.push({ el: cr, doc: code });
  }
  LETTERS.forEach((ch, i) => { textRow(ch); if (CODE_AT[i]) codeRow(CODE_AT[i]); });

  // ---------- CM6 (real editor for the code-block note items); graceful fallback to editable text ----------
  (async function initCM6() {
    try {
      const [V, St, Cm, LJ] = await Promise.all([
        import('https://esm.sh/@codemirror/view@6'),
        import('https://esm.sh/@codemirror/state@6'),
        import('https://esm.sh/@codemirror/commands@6'),
        import('https://esm.sh/@codemirror/lang-javascript@6'),
      ]);
      const { EditorView, keymap } = V;
      const { EditorState } = St;
      const { defaultKeymap, history, historyKeymap } = Cm;
      const { javascript } = LJ;
      for (const m of codeMounts) {
        new EditorView({
          state: EditorState.create({ doc: m.doc, extensions: [history(), keymap.of([...defaultKeymap, ...historyKeymap]), javascript(), EditorView.lineWrapping] }),
          parent: m.el
        });
      }
      cm6ok = true;
    } catch (e) {
      cm6err = String(e && e.message || e).slice(0, 80);
      for (const m of codeMounts) { m.el.classList.add('cmfail'); m.el.contentEditable = 'true'; m.el.textContent = m.doc; }
    }
  })();

  // ---------- SCREEN_H (constant; window.innerHeight drifts with scroll on iOS) ----------
  function refreshScreenH() {
    if (document.activeElement === document.body && window.scrollY === 0 && vv && Math.round(vv.offsetTop) === 0
        && Math.round(vv.height) >= window.innerHeight - 2) SCREEN_H = window.innerHeight;
  }
  // ---------- bar pin = SB2 ----------
  function place() {
    refreshScreenH();
    let ty = vv ? Math.round(vv.height + vv.offsetTop - SCREEN_H) : 0;
    if (ty > -2) ty = 0;
    bar.style.transform = 'translateY(' + ty + 'px)';
  }
  // ---------- learn the real keyboard height from a form-control-style shrink ----------
  function learnKb() {
    if (!vv) return;
    const d = Math.round(window.innerHeight - vv.height);
    if (d > 100) { learnedKb = d; try { localStorage.setItem('kbtest_kb', String(d)); } catch (_) {} }
  }

  // ---------- the measured Apple-Notes reveal ----------
  function cubicBezier(x1, y1, x2, y2) {
    const cx = 3 * x1, bx = 3 * (x2 - x1) - cx, ax = 1 - cx - bx;
    const cy = 3 * y1, by = 3 * (y2 - y1) - cy, ay = 1 - cy - by;
    const fx = t => ((ax * t + bx) * t + cx) * t, fy = t => ((ay * t + by) * t + cy) * t;
    const dfx = t => (3 * ax * t + 2 * bx) * t + cx;
    return function (x) {
      let t = x;
      for (let i = 0; i < 8; i++) { const e = fx(t) - x; if (Math.abs(e) < 1e-5) break; const d = dfx(t); if (Math.abs(d) < 1e-6) break; t -= e / d; }
      return fy(Math.max(0, Math.min(1, t)));
    };
  }
  const AN_EASE = cubicBezier(0.42, 0, 0.58, 1);   // ease-in-out (best match to the measured curve)
  function kbTopScreenY() { return (vv && vv.height < SCREEN_H - 100) ? vv.height : (SCREEN_H - (learnedKb || 0)); }
  function caretBottomScreenY() {
    let rect = null;
    try {
      const s = window.getSelection && window.getSelection();
      if (s && s.rangeCount) {
        const rs = s.getRangeAt(0).getClientRects();
        if (rs && rs.length) rect = rs[rs.length - 1];
        else { const rr = s.getRangeAt(0).getBoundingClientRect(); if (rr && (rr.height || rr.width)) rect = rr; }
      }
    } catch (_) {}
    if (!rect) { const a = anFocusEl || document.activeElement; if (a && a.getBoundingClientRect) rect = a.getBoundingClientRect(); }
    return rect ? rect.bottom - (vv ? vv.offsetTop : 0) : null;
  }
  function animateScrollTo(toTop) {
    if (anTween) cancelAnimationFrame(anTween);
    const from = wrap.scrollTop, dist = toTop - from, t0 = performance.now();
    if (Math.abs(dist) < 1) return;
    anTween = requestAnimationFrame(function step(now) {
      const p = Math.min(1, (now - t0) / AN_DUR);
      wrap.scrollTop = from + dist * AN_EASE(p);
      paintFx();
      if (p < 1) anTween = requestAnimationFrame(step); else anTween = 0;
    });
  }
  function appleReveal() {
    if (!AN) return;
    const cb = caretBottomScreenY(); if (cb == null) return;
    const delta = cb - (kbTopScreenY() - AN_GAP);
    if (delta <= 1) return;                 // already above the keyboard → NO scroll (Apple)
    animateScrollTo(wrap.scrollTop + delta);
  }
  function freezeScroll() { if (!FREEZE || frozen) return; frozen = true; frozenTop = wrap.scrollTop; frozenOverflow = wrap.style.overflowY; wrap.style.overflowY = 'hidden'; }
  function unfreezeScroll() { if (!frozen) return; frozen = false; wrap.style.overflowY = frozenOverflow || 'auto'; wrap.scrollTop = frozenTop; }
  function doRevealNow() { unfreezeScroll(); appleReveal(); }

  function isEditableEl(t) {
    return !!t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.isContentEditable
      || (t.classList && t.classList.contains('cm-content')));
  }
  function maybeScheduleReveal() {
    const kbUp = vv && vv.height < SCREEN_H - 100;
    if (AN && anArmed && !anScheduled && kbUp) {
      anScheduled = true;
      setTimeout(() => { if (anArmed) { anArmed = false; doRevealNow(); } }, AN_DELAY);
    }
  }

  // ---------- finetune panel ----------
  function buildFxBtns() {
    fxbtns.innerHTML = '';
    const mk = (label, fn) => {
      const b = document.createElement('button'); b.type = 'button'; b.textContent = label;
      b.addEventListener('mousedown', e => e.preventDefault());
      b.addEventListener('click', e => { e.preventDefault(); fn(); buildFxBtns(); place(); paintFx(); });
      fxbtns.appendChild(b);
    };
    mk('AN:' + (AN ? 'ON' : 'off'), () => { AN = !AN; });
    mk('freeze:' + (FREEZE ? 'ON' : 'off'), () => { FREEZE = !FREEZE; if (!FREEZE) unfreezeScroll(); });
    mk('gap ' + AN_GAP, () => { AN_GAP = AN_GAP >= 42 ? 0 : AN_GAP + 7; });
    mk('delay ' + AN_DELAY, () => { AN_DELAY = AN_DELAY >= 550 ? 0 : AN_DELAY + 60; });
    mk('dur ' + AN_DUR, () => { AN_DUR = AN_DUR >= 600 ? 120 : AN_DUR + 60; });
    mk('copy', () => {
      const txt = fxdetail.textContent;
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).catch(() => {});
    });
  }
  function paintFx() {
    fxone.textContent = (AN ? 'AN' : 'an') + '/' + (FREEZE ? 'FRZ' : 'frz') +
      ' gap' + AN_GAP + ' delay' + AN_DELAY + ' dur' + AN_DUR +
      ' | vvh' + (vv ? Math.round(vv.height) : '?') + ' vvtop' + (vv ? Math.round(vv.offsetTop) : '?') +
      ' kb' + learnedKb + ' SH' + SCREEN_H + ' scr' + Math.round(wrap.scrollTop);
    if (fx.getAttribute('data-open') === '1') {
      fxdetail.textContent =
        'innerHeight ' + window.innerHeight + '  SCREEN_H ' + SCREEN_H + '\n' +
        'vv.height ' + (vv ? Math.round(vv.height) : 'n/a') + '  vv.offsetTop ' + (vv ? Math.round(vv.offsetTop) : 'n/a') + '\n' +
        'window.scrollY ' + Math.round(window.scrollY) + '  wrap.scrollTop ' + Math.round(wrap.scrollTop) + '\n' +
        'learnedKb ' + learnedKb + '  bar.bottom ' + Math.round(bar.getBoundingClientRect().bottom) + '\n' +
        'active ' + (document.activeElement ? (document.activeElement.tagName + (document.activeElement.className ? '.' + String(document.activeElement.className).split(' ')[0] : '')) : 'none') + '\n' +
        'AN ' + (AN ? 'ON' : 'off') + '  FREEZE ' + (FREEZE ? 'ON' : 'off') + '  frozen ' + frozen + '\n' +
        'gap ' + AN_GAP + '  delay ' + AN_DELAY + '  dur ' + AN_DUR + '\n' +
        'CM6 ' + (cm6ok ? 'loaded' : (cm6err ? 'FAILED: ' + cm6err : 'loading…'));
    }
    // keep the panel + toggle on-screen during a visual-viewport pan
    const oy = vv ? Math.round(vv.offsetTop) : 0;
    fx.style.transform = 'translateY(' + oy + 'px)';
    fxToggle.style.transform = 'translateY(' + oy + 'px)';
  }
  buildFxBtns();
  fxToggle.addEventListener('mousedown', e => e.preventDefault());
  fxToggle.addEventListener('click', e => { e.preventDefault(); fx.setAttribute('data-open', fx.getAttribute('data-open') === '1' ? '0' : '1'); paintFx(); });

  // ---------- event wiring ----------
  function onVV() { learnKb(); place(); maybeScheduleReveal(); paintFx(); }
  if (vv) { vv.addEventListener('resize', onVV); vv.addEventListener('scroll', onVV); }
  window.addEventListener('orientationchange', () => { learnKb(); place(); paintFx(); });
  document.addEventListener('focusin', (e) => {
    if (isEditableEl(e.target)) {
      anFocusEl = e.target; anArmed = true; anScheduled = false;
      freezeScroll();
      setTimeout(() => { if (AN && anArmed) { anArmed = false; doRevealNow(); } }, 650);   // fallback if vv never shrinks
    }
    [0, 120, 300, 550].forEach(d => setTimeout(() => { learnKb(); place(); paintFx(); }, d));
  });
  document.addEventListener('focusout', () => {
    anArmed = false; anScheduled = false; unfreezeScroll();
    setTimeout(() => { place(); paintFx(); }, 60);
    setTimeout(() => { place(); paintFx(); }, 280);
  });

  // expose for CDP/headless testing
  window.__AN = {
    reveal: appleReveal, kbTop: kbTopScreenY, caretBottom: caretBottomScreenY, animate: animateScrollTo,
    freeze: freezeScroll, unfreeze: unfreezeScroll,
    set: (k, v) => { if (k === 'learnedKb') learnedKb = v; else if (k === 'AN') AN = v; else if (k === 'FREEZE') FREEZE = v; else if (k === 'gap') AN_GAP = v; else if (k === 'delay') AN_DELAY = v; else if (k === 'dur') AN_DUR = v; },
    state: () => ({ AN, FREEZE, frozen, AN_DELAY, AN_DUR, AN_GAP, learnedKb, SCREEN_H, scrollTop: Math.round(wrap.scrollTop), barBottom: Math.round(bar.getBoundingClientRect().bottom), cm6ok, cm6err, codeRows: codeMounts.length })
  };

  // ---------- rAF loop ----------
  (function loop() { place(); paintFx(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
